<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #e0f7f6 0%, #f5f5f0 50%, #fce4ec 100%);
            min-height: 100vh;

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2d6a6a; font-size: 28px; margin-bottom: 10px; }
        .header p { color: #666; font-size: 14px; }
        .input-section {
            max-width: 800px;
            margin: 0 auto 30px;
            background: white;
            padding: 20px;

        }
        .input-section h3 { color: #2d6a6a; margin-bottom: 15px; font-size: 16px; }
        .url-inputs { display: grid; gap: 10px; }
        .url-row { display: flex; align-items: center; gap: 10px; }
        .url-row label { min-width: 100px; color: #333; font-weight: 500; }
        .url-row input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .url-row input:focus { outline: none; border-color: #2d6a6a; }
        .generate-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #2d6a6a 0%, #3d8a8a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(45, 106, 106, 0.3); }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }
        @media (max-width: 768px) { .qr-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .qr-grid { grid-template-columns: 1fr; } }
        .qr-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .qr-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .qr-card h3 { color: #2d6a6a; font-size: 20px; margin-bottom: 15px; }
        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .qr-container canvas { display: block; }
        .placeholder {
            width: 200px;
            height: 200px;
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }
        .download-btn {
            display: inline-block;
            padding: 8px 20px;
            background: #4db6ac;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .download-btn:hover { background: #26a69a; }
        .download-btn:disabled { background: #ccc; cursor: not-allowed; }
        .print-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #f48fb1;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(244, 143, 177, 0.4);
            transition: transform 0.2s;
        }
        .print-btn:hover { transform: scale(1.05); }
        @media print {
            .input-section, .print-btn, .download-btn { display: none !important; }
            body { background: white; }
            .qr-card { break-inside: avoid; box-shadow: none; border: 1px solid #eee; }
        }
    </style>

    <script>
        var QRCode = (function() {
            var ALPHANUMERIC_TABLE = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:";
            var QRMODE_NUMERIC = 1;
            var QRMODE_ALPHANUMERIC = 2;
            var QRMODE_BYTE = 4;

            var G15 = 0x537;
            var G18 = 0x1f25;

            function toUtf8(text) {
                var result = [];
                for (var i = 0; i < text.length; i++) {
                    var c = text.charCodeAt(i);
                    if (c < 0x80) {
                        result.push(c);
                    } else if (c < 0x800) {
                        result.push(0xC0 | (c >> 6), 0x80 | (c & 0x3F));
                    } else if (c < 0x10000) {
                        result.push(0xE0 | (c >> 12), 0x80 | ((c >> 6) & 0x3F), 0x80 | (c & 0x3F));
                    } else {
                        result.push(0xF0 | (c >> 18), 0x80 | ((c >> 12) & 0x3F), 0x80 | ((c >> 6) & 0x3F), 0x80 | (c & 0x3F));
                    }
                }
                return result;
            }

            function getMode(text) {
                if (/^[0-9]+$/.test(text)) return QRMODE_NUMERIC;
                if (/^[A-Z0-9 $%*+\-.\/:]+$/.test(text)) return QRMODE_ALPHANUMERIC;
                return QRMODE_BYTE;
            }

            function encodeNumeric(text) {
                var result = [];
                for (var i = 0; i < text.length; i += 3) {
                    var num = parseInt(text.substr(i, 3));
                    if (text.length - i == 1) {
                        result = result.concat(toBits(num, 4));
                    } else if (text.length - i == 2) {
                        result = result.concat(toBits(num, 7));
                    } else {
                        result = result.concat(toBits(num, 10));
                    }
                }
                return result;
            }

            function encodeAlphanumeric(text) {
                var result = [];
                for (var i = 0; i < text.length; i += 2) {
                    var c1 = ALPHANUMERIC_TABLE.indexOf(text[i]);
                    var c2 = (i + 1 < text.length) ? ALPHANUMERIC_TABLE.indexOf(text[i + 1]) : 0;
                    var val = c1 * 45 + c2;
                    result = result.concat(toBits(val, 11));
                }
                return result;
            }

            function encodeByte(text) {
                var utf8 = toUtf8(text);
                var result = [];
                for (var i = 0; i < utf8.length; i++) {
                    result = result.concat(toBits(utf8[i], 8));
                }
                return result;
            }

            function toBits(value, length) {
                var bits = [];
                for (var i = length - 1; i >= 0; i--) {
                    bits.push((value >> i) & 1);
                }
                return bits;
            }

            function getVersion(text, ecLevel) {
                var utf8Len = toUtf8(text).length;
                var capacities = [
                    {L:17,M:14,Q:11,H:7}, {L:32,M:26,Q:20,H:14}, {L:53,M:42,Q:32,H:24},
                    {L:78,M:62,Q:46,H:34}, {L:106,M:84,Q:60,H:44}, {L:134,M:106,Q:74,H:55},
                    {L:154,M:122,Q:86,H:64}, {L:192,M:152,Q:108,H:77}, {L:230,M:180,Q:130,H:90},
                    {L:271,M:213,Q:151,H:106}, {L:321,M:251,Q:177,H:122}, {L:367,M:287,Q:203,H:140}
                ];
                for (var i = 0; i < capacities.length; i++) {
                    if (utf8Len <= capacities[i][ecLevel]) return i + 1;
                }
                return 12;
            }

            function getBlockInfo(version, ecLevel) {
                var info = [
                    [{total:1, data:19, ec:7}, {total:1, data:16, ec:10}, {total:1, data:13, ec:13}, {total:1, data:9, ec:17}],
                    [{total:1, data:34, ec:10}, {total:1, data:28, ec:16}, {total:1, data:22, ec:22}, {total:1, data:16, ec:28}],
                    [{total:1, data:55, ec:15}, {total:1, data:44, ec:26}, {total:2, data:17, ec:18}, {total:2, data:13, ec:22}],
                    [{total:1, data:80, ec:20}, {total:2, data:32, ec:18}, {total:2, data:24, ec:26}, {total:4, data:9, ec:16}],
                    [{total:1, data:108, ec:26}, {total:1, data:86, ec:36}, {total:2, data:36, ec:36}, {total:2, data:27, ec:44}],
                    [{total:2, data:68, ec:18}, {total:2, data:54, ec:24}, {total:4, data:24, ec:24}, {total:4, data:18, ec:30}],
                    [{total:2, data:78, ec:20}, {total:2, data:64, ec:30}, {total:2, data:46, ec:42}, {total:4, data:33, ec:36}],
                    [{total:2, data:97, ec:24}, {total:4, data:43, ec:24}, {total:4, data:34, ec:38}, {total:4, data:30, ec:48}],
                    [{total:2, data:116, ec:30}, {total:2, data:86, ec:42}, {total:4, data:43, ec:46}, {total:5, data:32, ec:42}],
                    [{total:2, data:134, ec:36}, {total:2, data:101, ec:52}, {total:4, data:50, ec:54}, {total:5, data:38, ec:52}],
                    [{total:2, data:154, ec:42}, {total:4, data:68, ec:36}, {total:6, data:36, ec:42}, {total:5, data:44, ec:62}],
                    [{total:4, data:86, ec:24}, {total:4, data:68, ec:30}, {total:4, data:54, ec:46}, {total:8, data:31, ec:36}]
                ];
                return info[Math.min(version - 1, info.length - 1)][{'L':0,'M':1,'Q':2,'H':3}[ecLevel]];
            }

            function generateEC(data, ecCount) {
                var poly = ecCount === 7 ? G15 : ecCount === 10 ? G18 : G18;
                var degree = ecCount === 7 ? 10 : ecCount === 10 ? 13 : 15;
                var reg = [];
                for (var i = 0; i < degree; i++) reg.push(0);
                for (var i = 0; i < data.length; i++) {
                    var feedback = reg.shift() ^ data[i];
                    reg.push(0);
                    for (var j = 0; j < degree; j++) {
                        if ((poly >> (degree - 1 - j)) & 1) {
                            reg[j] ^= feedback;
                        }
                    }
                }
                for (var i = 0; i < degree; i++) {
                    var feedback = reg.shift();
                    reg.push(0);
                    for (var j = 0; j < degree; j++) {
                        if ((poly >> (degree - 1 - j)) & 1) {
                            reg[j] ^= feedback;
                        }
                    }
                }
                return reg;
            }

            function bitsToBytes(bits) {
                var bytes = [];
                for (var i = 0; i < bits.length; i += 8) {
                    var byte = 0;
                    for (var j = 0; j < 8; j++) {
                        byte = (byte << 1) | (bits[i + j] || 0);
                    }
                    bytes.push(byte);
                }
                return bytes;
            }

            function bytesToBits(bytes) {
                var bits = [];
                for (var i = 0; i < bytes.length; i++) {
                    bits = bits.concat(toBits(bytes[i], 8));
                }
                return bits;
            }

            function encode(text) {
                var mode = getMode(text);
                var ecLevel = 'L';
                var version = getVersion(text, ecLevel);
                var blockInfo = getBlockInfo(version, ecLevel);

                var bits = [];
                bits = bits.concat(toBits(mode, 4));
                
                var textLen = (mode === QRMODE_BYTE) ? toUtf8(text).length : text.length;
                var lenBits = mode === QRMODE_NUMERIC ? 10 : mode === QRMODE_ALPHANUMERIC ? 9 : 8;
                bits = bits.concat(toBits(textLen, lenBits));

                if (mode === QRMODE_NUMERIC) bits = bits.concat(encodeNumeric(text));
                else if (mode === QRMODE_ALPHANUMERIC) bits = bits.concat(encodeAlphanumeric(text));
                else bits = bits.concat(encodeByte(text));

                while (bits.length % 8 !== 0) bits.push(0);

                var bytes = bitsToBytes(bits);
                var totalDataBytes = blockInfo.total * blockInfo.data;
                while (bytes.length < totalDataBytes) {
                    bytes.push(bytes.length % 2 === 0 ? 0xEC : 0x11);
                }

                var blocks = [];
                for (var i = 0; i < blockInfo.total; i++) {
                    var start = i * blockInfo.data;
                    var data = bytes.slice(start, start + blockInfo.data);
                    var ec = generateEC(data, blockInfo.ec);
                    blocks.push({ data: data, ec: ec });
                }

                var finalBytes = [];
                for (var i = 0; i < blockInfo.data; i++) {
                    for (var j = 0; j < blockInfo.total; j++) {
                        finalBytes.push(blocks[j].data[i]);
                    }
                }
                for (var i = 0; i < blockInfo.ec; i++) {
                    for (var j = 0; j < blockInfo.total; j++) {
                        finalBytes.push(blocks[j].ec[i]);
                    }
                }

                return { bits: bytesToBits(finalBytes), version: version, ecLevel: ecLevel };
            }

            function createMatrix(data) {
                var version = data.version;
                var size = version * 4 + 17;
                var matrix = [];
                var reserved = [];
                for (var i = 0; i < size; i++) {
                    matrix[i] = [];
                    reserved[i] = [];
                    for (var j = 0; j < size; j++) {
                        matrix[i][j] = null;
                        reserved[i][j] = false;
                    }
                }

                drawFinder(matrix, reserved, 0, 0);
                drawFinder(matrix, reserved, size - 7, 0);
                drawFinder(matrix, reserved, 0, size - 7);

                if (version >= 2) {
                    drawAlignment(matrix, reserved, version, size);
                }

                drawTiming(matrix, reserved, size);

                drawDarkModule(matrix, reserved, size);

                if (version >= 7) {
                    drawVersionInfo(matrix, reserved, version, size);
                }

                fillData(matrix, reserved, data.bits, size);

                applyMask(matrix, reserved, 0, size);

                drawFormatInfo(matrix, reserved, data.ecLevel, 0, size);

                return matrix;
            }

            function drawFinder(matrix, reserved, row, col) {
                for (var i = -1; i <= 7; i++) {
                    for (var j = -1; j <= 7; j++) {
                        var r = row + i;
                        var c = col + j;
                        if (r < 0 || r >= matrix.length || c < 0 || c >= matrix.length) continue;
                        reserved[r][c] = true;
                        if (i === -1 || i === 7 || j === -1 || j === 7) {
                            matrix[r][c] = true;
                        } else if (i >= 1 && i <= 5 && j >= 1 && j <= 5) {
                            if (i === 1 || i === 5 || j === 1 || j === 5) {
                                matrix[r][c] = true;
                            } else if (i >= 2 && i <= 4 && j >= 2 && j <= 4) {
                                if (i === 2 || i === 4 || j === 2 || j === 4) {
                                    matrix[r][c] = false;
                                } else {
                                    matrix[r][c] = true;
                                }
                            }
                        } else {
                            matrix[r][c] = false;
                        }
                    }
                }
            }

            function drawAlignment(matrix, reserved, version, size) {
                var positions = [6];
                var count = Math.floor(version / 7) + 2;
                var step = (size - 13) / (count - 1);
                for (var i = 0; i < count - 1; i++) {
                    positions.push(Math.floor(6 + (i + 1) * step));
                }
                for (var i = 0; i < positions.length; i++) {
                    for (var j = 0; j < positions.length; j++) {
                        var x = positions[i];
                        var y = positions[j];
                        if ((x < 9 && y < 9) || (x < 9 && y > size - 9) || (x > size - 9 && y < 9)) continue;
                        for (var dx = -2; dx <= 2; dx++) {
                            for (var dy = -2; dy <= 2; dy++) {
                                reserved[x + dx][y + dy] = true;
                                if (dx === -2 || dx === 2 || dy === -2 || dy === 2) {
                                    matrix[x + dx][y + dy] = true;
                                } else if (dx === 0 && dy === 0) {
                                    matrix[x + dx][y + dy] = true;
                                } else {
                                    matrix[x + dx][y + dy] = false;
                                }
                            }
                        }
                    }
                }
            }

            function drawTiming(matrix, reserved, size) {
                for (var i = 8; i < size - 8; i++) {
                    reserved[6][i] = true;
                    reserved[i][6] = true;
                    matrix[6][i] = (i % 2 === 0);
                    matrix[i][6] = (i % 2 === 0);
                }
            }

            function drawDarkModule(matrix, reserved, size) {
                reserved[size - 8][8] = true;
                matrix[size - 8][8] = true;
            }

            function drawVersionInfo(matrix, reserved, version, size) {
                var data = version;
                var bits = [];
                for (var i = 0; i < 18; i++) bits.push((data >> i) & 1);
                for (var i = 0; i < 18; i++) {
                    var row = Math.floor(i / 3);
                    var col = i % 3;
                    reserved[row][size - 11 + col] = true;
                    reserved[size - 11 + col][row] = true;
                    matrix[row][size - 11 + col] = bits[i];
                    matrix[size - 11 + col][row] = bits[i];
                }
            }

            function fillData(matrix, reserved, bits, size) {
                var bitIdx = 0;
                var col = size - 1;
                while (col > 0) {
                    if (col === 6) col--;
                    for (var row = size - 1; row >= 0; row--) {
                        for (var j = 0; j < 2; j++) {
                            var c = col - j;
                            if (c < 0) continue;
                            if (!reserved[row][c] && matrix[row][c] === null) {
                                matrix[row][c] = bitIdx < bits.length ? bits[bitIdx++] : false;
                            }
                        }
                    }
                    col -= 2;
                }
            }

            function applyMask(matrix, reserved, maskPattern, size) {
                var masks = [
                    function(i, j) { return (i + j) % 2 === 0; },
                    function(i, j) { return i % 2 === 0; },
                    function(i, j) { return j % 3 === 0; },
                    function(i, j) { return (i + j) % 3 === 0; },
                    function(i, j) { return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 === 0; },
                    function(i, j) { return (i * j) % 2 + (i * j) % 3 === 0; },
                    function(i, j) { return ((i * j) % 2 + (i * j) % 3) % 2 === 0; },
                    function(i, j) { return ((i * j) % 3 + (i + j) % 2) % 2 === 0; }
                ];
                var mask = masks[maskPattern];
                for (var i = 0; i < size; i++) {
                    for (var j = 0; j < size; j++) {
                        if (!reserved[i][j] && matrix[i][j] !== null) {
                            if (mask(i, j)) {
                                matrix[i][j] = !matrix[i][j];
                            }
                        }
                    }
                }
            }

            function drawFormatInfo(matrix, reserved, ecLevel, maskPattern, size) {
                var ecMap = {'L':0,'M':1,'Q':2,'H':3};
                var data = (ecMap[ecLevel] << 3) | maskPattern;
                var mask = 0x5412;
                var encoded = data ^ mask;
                
                for (var i = 0; i < 15; i++) {
                    var bit = (encoded >> i) & 1;
                    if (i < 6) {
                        reserved[i][8] = true;
                        reserved[8][size - 1 - i] = true;
                        matrix[i][8] = bit;
                        matrix[8][size - 1 - i] = bit;
                    } else if (i === 6) {
                        reserved[6][8] = true;
                        matrix[6][8] = bit;
                    } else {
                        reserved[size - 15 + i][8] = true;
                        reserved[8][15 - i] = true;
                        matrix[size - 15 + i][8] = bit;
                        matrix[8][15 - i] = bit;
                    }
                }
            }

            function draw(canvas, text, options) {
                var opts = options || {};
                var size = opts.width || 200;
                var margin = opts.margin || 2;
                var fgColor = opts.color && opts.color.dark ? opts.color.dark : '#2d6a6a';
                var bgColor = opts.color && opts.color.light ? opts.color.light : '#ffffff';

                var encoded = encode(text);
                var matrix = createMatrix(encoded);
                var cellSize = (size - margin * 2) / matrix.length;

                var ctx = canvas.getContext('2d');
                canvas.width = size;
                canvas.height = size;

                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, size, size);

                ctx.fillStyle = fgColor;
                for (var i = 0; i < matrix.length; i++) {
                    for (var j = 0; j < matrix[i].length; j++) {
                        if (matrix[i][j]) {
                            ctx.fillRect(j * cellSize + margin, i * cellSize + margin, cellSize, cellSize);
                        }
                    }
                }
            }

            return { draw: draw };
        })();

        const audioFiles = [
            { name: '入学不愁', urlId: 'url1', qrId: 'qr1', dlId: 'dl1' },
            { name: '学费不慌', urlId: 'url2', qrId: 'qr2', dlId: 'dl2' },
            { name: '生活有助', urlId: 'url3', qrId: 'qr3', dlId: 'dl3' },
            { name: '升学不断', urlId: 'url4', qrId: 'qr4', dlId: 'dl4' },
            { name: '广东专项', urlId: 'url5', qrId: 'qr5', dlId: 'dl5' },
            { name: '优秀有奖', urlId: 'url6', qrId: 'qr6', dlId: 'dl6' }
        ];

        function generateAllQR() {
            audioFiles.forEach(function(audio) {
                var url = document.getElementById(audio.urlId).value.trim();
                var qrContainer = document.getElementById(audio.qrId);
                var downloadBtn = document.getElementById(audio.dlId);
                qrContainer.innerHTML = '';
                if (url) {
                    var canvas = document.createElement('canvas');
                    QRCode.draw(canvas, url, {
                        width: 200,
                        margin: 2,
                        color: { dark: '#2d6a6a', light: '#ffffff' }
                    });
                    qrContainer.appendChild(canvas);
                    downloadBtn.disabled = false;
                } else {
                    qrContainer.innerHTML = '<div class="placeholder">请输入链接后生成</div>';
                    downloadBtn.disabled = true;
                }
            });
        }

        function downloadQR(qrId, name) {
            var container = document.getElementById(qrId);
            var canvas = container.querySelector('canvas');
            if (!canvas) return;
            var link = document.createElement('a');
            link.download = name + '_二维码.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        window.addEventListener('DOMContentLoaded', function() {
            generateAllQR();
        });
    </script>
</body>
