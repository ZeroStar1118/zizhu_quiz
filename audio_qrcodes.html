            flex: 1;
            padding: 8px 12px;

            font-size: 14px;
            transition: border-color 0.3s;

            border: none;

            font-size: 16px;
            font-weight: 500;
            cursor: pointer;

            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }
        @media (max-width: 768px) { .qr-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .qr-grid { grid-template-columns: 1fr; } }

            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .qr-card h3 { color: #2d6a6a; font-size: 20px; margin-bottom: 15px; }
        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .qr-container canvas { display: block; }
        .placeholder {
            width: 200px;
            height: 200px;
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;

            background: #4db6ac;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;

        .download-btn:disabled { background: #ccc; cursor: not-allowed; }
        .print-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #f48fb1;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(244, 143, 177, 0.4);

        function QRRSBlock(t, e) {
            this.totalCount = t;
            this.dataCount = e;
        }
        QRRSBlock.RS_BLOCK_TABLE = [
            [1, 26, 19], [1, 44, 34], [1, 70, 55], [1, 100, 80], [1, 134, 108],
            [2, 86, 68], [2, 100, 78], [2, 122, 97], [2, 146, 116], [2, 172, 134],
            [4, 106, 86], [4, 122, 96], [4, 140, 106], [4, 160, 116], [4, 182, 133],
            [4, 206, 151], [4, 232, 167], [4, 260, 185], [4, 288, 203], [6, 186, 134],
            [6, 206, 144], [6, 226, 154], [6, 248, 164], [6, 270, 174], [6, 294, 184]
        ];
        QRRSBlock.getRSBlocks = function(t, e) {
            var n = QRRSBlock.getRsBlockTable(t, e);
            if (n === undefined) {
                throw new Error("bad version / error correction level");
            }
            var i = n.length / 3;
            var r = [];
            for (var o = 0; o < i; o++) {
                var s = n[o * 3 + 0];
                var a = n[o * 3 + 1];
                var u = n[o * 3 + 2];
                for (var l = 0; l < s; l++) {
                    r.push(new QRRSBlock(a, u));
                }
            }
            return r;
        };
        QRRSBlock.getRsBlockTable = function(t, e) {
            switch (e) {
                case QRCode.CorrectLevel.L:
                    return QRRSBlock.RS_BLOCK_TABLE[t - 1];
                case QRCode.CorrectLevel.M:
                    return QRRSBlock.RS_BLOCK_TABLE[t - 1];
                case QRCode.CorrectLevel.Q:
                    return QRRSBlock.RS_BLOCK_TABLE[t - 1];
                case QRCode.CorrectLevel.H:
                    return QRRSBlock.RS_BLOCK_TABLE[t - 1];
            }
            return undefined;
        };
        function QRUtil() {}
        QRUtil.getBCHTypeNumber = function(t) {
            var e = t << 10;
            while (QRUtil.getBCHDigit(e) - QRUtil.getBCHDigit(1335) >= 0) {
                e ^= 1335 << (QRUtil.getBCHDigit(e) - QRUtil.getBCHDigit(1335));
            }
            return ((t << 10) | e) ^ 21522;
        };
        QRUtil.getBCHTypeInfo = function(t) {
            var e = t << 10;
            while (QRUtil.getBCHDigit(e) - QRUtil.getBCHDigit(7973) >= 0) {
                e ^= 7973 << (QRUtil.getBCHDigit(e) - QRUtil.getBCHDigit(7973));
            }
            return ((t << 10) | e) ^ 21522;
        };
        QRUtil.getBCHDigit = function(t) {
            var e = 0;
            while (t !== 0) {
                e++;
                t >>>= 1;
            }
            return e;
        };

        QRUtil.getMask = function(t, e, n) {
            switch (t) {
                case 0:
                    return (e + n) % 2 === 0;
                case 1:
                    return e % 2 === 0;
                case 2:
                    return n % 3 === 0;
                case 3:
                    return (e + n) % 3 === 0;
                case 4:
                    return (Math.floor(e / 2) + Math.floor(n / 3)) % 2 === 0;
                case 5:
                    return (e * n) % 2 + (e * n) % 3 === 0;
                case 6:
                    return ((e * n) % 2 + (e * n) % 3) % 2 === 0;
                case 7:
                    return ((e * n) % 3 + (e + n) % 2) % 2 === 0;
            }

        };
        QRUtil.getLengthInBits = function(t, e) {
            if (1 <= e && e < 10) {
                switch (t) {
                    case QRMode.MODE_NUMBER:
                        return 10;
                    case QRMode.MODE_ALPHA_NUM:
                        return 9;
                    case QRMode.MODE_8BIT_BYTE:
                        return 8;
                    case QRMode.MODE_KANJI:
                        return 8;
                }
            } else if (10 <= e && e < 27) {
                switch (t) {
                    case QRMode.MODE_NUMBER:
                        return 12;
                    case QRMode.MODE_ALPHA_NUM:
                        return 11;
                    case QRMode.MODE_8BIT_BYTE:
                        return 16;
                    case QRMode.MODE_KANJI:
                        return 10;
                }
            } else if (27 <= e && e < 41) {
                switch (t) {
                    case QRMode.MODE_NUMBER:
                        return 14;
                    case QRMode.MODE_ALPHA_NUM:
                        return 13;
                    case QRMode.MODE_8BIT_BYTE:
                        return 16;
                    case QRMode.MODE_KANJI:
                        return 12;
                }
            }
            throw new Error("bad version:" + e);
        };
        QRUtil.getLostPoint = function(t) {
            var e = t.getModuleCount();
            var n = 0;
            for (var i = 0; i < e; i++) {
                for (var r = 0; r < e; r++) {
                    var o = 0;
                    var s = t.isDark(i, r);
                    for (var a = -1; a <= 1; a++) {
                        if (i + a < 0 || e <= i + a) {
                            continue;
                        }
                        for (var u = -1; u <= 1; u++) {
                            if (r + u < 0 || e <= r + u) {
                                continue;
                            }
                            if (a === 0 && u === 0) {
                                continue;
                            }
                            if (s === t.isDark(i + a, r + u)) {
                                o++;
                            }
                        }
                    }
                    if (o > 5) {
                        n += 3 + o - 5;
                    }
                }
            }
            for (var i = 0; i < e - 1; i++) {
                for (var r = 0; r < e - 1; r++) {
                    var l = 0;
                    if (t.isDark(i, r)) {
                        l++;
                    }
                    if (t.isDark(i + 1, r)) {
                        l++;
                    }
                    if (t.isDark(i, r + 1)) {
                        l++;
                    }
                    if (t.isDark(i + 1, r + 1)) {
                        l++;
                    }
                    if (l === 0 || l === 4) {
                        n += 3;
                    }
                }
            }
            for (var i = 0; i < e; i++) {
                for (var r = 0; r < e - 6; r++) {
                    if (t.isDark(i, r) && !t.isDark(i, r + 1) && t.isDark(i, r + 2) && t.isDark(i, r + 3) && t.isDark(i, r + 4) && !t.isDark(i, r + 5) && t.isDark(i, r + 6)) {
                        n += 40;
                    }
                }
            }
            for (var r = 0; r < e; r++) {
                for (var i = 0; i < e - 6; i++) {
                    if (t.isDark(i, r) && !t.isDark(i + 1, r) && t.isDark(i + 2, r) && t.isDark(i + 3, r) && t.isDark(i + 4, r) && !t.isDark(i + 5, r) && t.isDark(i + 6, r)) {
                        n += 40;
                    }
                }
            }
            var c = 0;
            for (var r = 0; r < e; r++) {
                for (var i = 0; i < e; i++) {
                    if (t.isDark(i, r)) {
                        c++;
                    }
                }
            }
            var h = Math.abs(100 * c / e / e - 50) / 5;
            n += h * 10;
            return n;
        };

        var audioFiles = [

        ];

        function generateAllQR() {
            audioFiles.forEach(function(audio) {
                var url = document.getElementById(audio.urlId).value.trim();
                var qrContainer = document.getElementById(audio.qrId);
                var downloadBtn = document.getElementById(audio.dlId);
                qrContainer.innerHTML = '';
                if (url) {
                    try {
                        var qr = new QRCode({
                            width: 200,
                            height: 200,
                            colorDark: '#2d6a6a',
                            colorLight: '#ffffff',
                            correctLevel: QRCode.CorrectLevel.H
                        });
                        qr.addData(url);
                        var canvas = qr.makeImage();
                        qrContainer.appendChild(canvas);
                        downloadBtn.disabled = false;
                    } catch (err) {
                        qrContainer.innerHTML = '<div class="placeholder">生成失败: ' + err.message + '</div>';
                        downloadBtn.disabled = true;
                    }
                } else {
                    qrContainer.innerHTML = '<div class="placeholder">请输入链接后生成</div>';
                    downloadBtn.disabled = true;
                }
            });
        }

        function downloadQR(qrId, name) {
            var container = document.getElementById(qrId);
            var canvas = container.querySelector('canvas');
            if (!canvas) return;
            var link = document.createElement('a');
            link.download = name + '_二维码.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        window.addEventListener('DOMContentLoaded', function() {
            generateAllQR();
        });
